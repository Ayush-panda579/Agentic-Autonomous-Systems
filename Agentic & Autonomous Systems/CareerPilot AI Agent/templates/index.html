{% extends 'base.html' %}

{% block content %}

<h1>Career Helper</h1>

<div class="card p-4">

<form action="/upload"
      method="POST"
      enctype="multipart/form-data">

    <label class="form-label">
        Upload Resume PDF
    </label>

    <input
    type="file"
    name="resume"
    class="form-control"
    required>

    <br>

    <button
    class="btn btn-primary">
        Analyze Resume
    </button>

</form>

</div>

{% endblock %}
