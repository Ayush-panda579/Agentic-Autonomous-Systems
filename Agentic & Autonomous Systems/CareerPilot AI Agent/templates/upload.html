<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | CareerPilot AI</title>

```
<style>

    body{
        font-family: Arial, sans-serif;
        background:#f4f6f9;
        margin:0;
        padding:0;
    }

    .container{
        width:500px;
        margin:60px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        color:#333;
    }

    p{
        text-align:center;
        color:#666;
    }

    input[type="file"]{
        width:100%;
        padding:10px;
        margin-top:15px;
        margin-bottom:20px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        background:#007bff;
        color:white;
        font-size:16px;
        border-radius:5px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    .back-btn{
        display:block;
        text-align:center;
        margin-top:15px;
        text-decoration:none;
        color:#007bff;
    }

    .flash{
        padding:10px;
        margin-bottom:15px;
        border-radius:5px;
    }

    .success{
        background:#d4edda;
        color:#155724;
    }

    .danger{
        background:#f8d7da;
        color:#721c24;
    }

    .warning{
        background:#fff3cd;
        color:#856404;
    }

</style>
```

</head>

<body>

<div class="container">

```
<h1>CareerPilot AI</h1>

<p>Upload your resume in PDF format</p>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form
    action="{{ url_for('upload') }}"
    method="POST"
    enctype="multipart/form-data"
>

    <input
        type="file"
        name="resume"
        accept=".pdf"
        required
    >

    <button type="submit">
        Upload Resume
    </button>

</form>

<a
    href="{{ url_for('dashboard') }}"
    class="back-btn"
>
    Back to Dashboard
</a>
```

</div>

</body>
</html>
